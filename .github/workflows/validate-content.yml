name: Validate content

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check generated catalog
        run: python tools/build-catalog.py --check
      - name: Validate content
        run: python tools/validate-content.py
